services:
  mongodb:
    image: mongo:7
    container_name: wbuk-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: wbuk_triage
    volumes:
      - mongodb_data:/data/db
    networks:
      - wbuk-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: wbuk-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - wbuk-network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: wbuk-backend
    restart: unless-stopped
    environment:
      MONGO_URL: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/wbuk_triage?authSource=admin
      DB_NAME: wbuk_triage
      AI_PROVIDER: ${AI_PROVIDER:-emergent}
      AI_API_KEY: ${AI_API_KEY:-${EMERGENT_LLM_KEY}}
      EMERGENT_LLM_KEY: ${EMERGENT_LLM_KEY}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${PUBLIC_URL}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - wbuk-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_BACKEND_URL: ${PUBLIC_URL}
    container_name: wbuk-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - wbuk-network

volumes:
  mongodb_data:
  minio_data:

networks:
  wbuk-network:
    driver: bridge
